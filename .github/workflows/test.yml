name: Test

on:
  push:
    branches: [ "main" ]
  pull_request_target:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} @ Go ${{ matrix.go }}
    env:
      CGO_ENABLED: '1'
    strategy:
        fail-fast: false
        matrix:
            os: [ubuntu-latest, macos-latest, windows-latest]
            go: ['stable']
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go }}

    - name: Set up MSYS2 MinGW toolchain
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc

    - name: Configure Windows cgo environment
      if: runner.os == 'Windows'
      run: |
        echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH
        echo "CC=C:/msys64/mingw64/bin/gcc.exe" >> $GITHUB_ENV
        echo "CXX=C:/msys64/mingw64/bin/g++.exe" >> $GITHUB_ENV

    - name: Build (Unix)
      if: runner.os != 'Windows'
      run: go build -v ./...

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: go build -v ./...

    - name: Test with coverage (Linux)
      if: runner.os == 'Linux'
      run: |
        go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

    - name: Test with coverage (macOS)
      if: runner.os == 'macOS'
      run: |
        go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

    - name: Test with coverage (Windows)
      if: runner.os == 'Windows'
      run: |
        go test --% -v -race -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5.5.3
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        files: ./coverage.out
        flags: ${{ matrix.os }}-go${{ matrix.go }}
        name: codecov-${{ matrix.os }}-go${{ matrix.go }}
        fail_ci_if_error: true
        verbose: true


